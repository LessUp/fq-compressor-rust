# Cargo build configuration
# https://doc.rust-lang.org/cargo/reference/config.html

[target.x86_64-pc-windows-msvc]
# Use lld linker for faster linking on Windows (if available)
# Uncomment if lld-link is installed (ships with LLVM or recent Rust nightly)
# rustflags = ["-C", "linker=lld-link"]

[target.x86_64-unknown-linux-gnu]
# Use mold linker on Linux for faster linking (if available)
# Uncomment if mold is installed: sudo apt install mold
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-apple-darwin]
# Split debuginfo for faster linking on macOS
rustflags = ["-C", "split-debuginfo=unpacked"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "split-debuginfo=unpacked"]

# Optimize build for native CPU when building release locally
# This is NOT set globally to keep CI builds portable
# Use: RUSTFLAGS="-C target-cpu=native" cargo build --release
