# .github/workflows/pages.yml
# =============================================================================
# GitBook Documentation Pages Deployment
# =============================================================================
# Builds and deploys documentation to GitHub Pages.
# Features: PR preview, branch preview, manual dispatch, artifact caching.
# =============================================================================

name: Documentation Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CHANGELOG.md'
      - 'RELEASE_zh.md'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CHANGELOG.md'
      - 'RELEASE_zh.md'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ===========================================================================
  # Build Documentation
  # ===========================================================================
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs
            package.json
            package-lock.json
            README.md
            README.zh-CN.md
            CHANGELOG.md
            RELEASE_zh.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Honkit site
        run: npm run docs:build

      - name: Validate build output
        run: |
          if [ ! -d "docs/.site" ]; then
            echo "::error::Documentation build failed - output directory not found"
            exit 1
          fi
          if [ ! -f "docs/.site/index.html" ]; then
            echo "::error::Documentation build failed - index.html not found"
            exit 1
          fi
          echo "Documentation build successful"
          echo "Output size: $(du -sh docs/.site | cut -f1)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.site

  # ===========================================================================
  # Deploy to GitHub Pages (main/master branch only)
  # ===========================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ===========================================================================
  # PR Preview (comment with preview URL)
  # ===========================================================================
  preview:
    name: PR Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: site

      - name: Deploy to PR preview
        id: preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      - name: Comment PR preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.issue.number;
            const preview_url = `${{ steps.preview.outputs.deployment-url }}`;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number
            });

            const bot_comment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📚 Documentation Preview')
            );

            const body = `## 📚 Documentation Preview

            | Status | URL |
            |--------|-----|
            | ✅ Built | [Preview Documentation](${preview_url}) |

            > This preview was built from commit \`${{ github.sha }}\`.

            ---
            <sub>Preview will be updated on new commits to this PR.</sub>`;

            if (bot_comment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: bot_comment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body: body
              });
            }
