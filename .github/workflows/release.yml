name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: fqc

jobs:
  # ── Validate version consistency ──────────────────────────────────
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION ✓"

  # ── Run full test suite before releasing ──────────────────────────
  test:
    name: Pre-release Test
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib --tests

  # ── Build release binaries for all platforms ──────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            musl: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Prepare archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$STAGING/"
          cp README.md LICENSE* CHANGELOG.md "$STAGING/" 2>/dev/null || true
          tar czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" $staging/
          if (Test-Path "README.md") { Copy-Item "README.md" $staging/ }
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" $staging/ }
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          echo "ASSET=$staging.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^$TAG$" | tail -1)
          {
            echo "body<<EOF"
            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$TAG" ]; then
              echo "## What's New / 更新内容"
              echo ""
              echo "Initial release of \`fqc\` — High-Performance FASTQ Compressor."
              echo ""
              echo "\`fqc\` 首次发布 — 高性能 FASTQ 压缩工具。"
            else
              echo "## Changes since $PREV_TAG / 自 $PREV_TAG 以来的变更"
              echo ""
              git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$TAG"
              echo ""
              echo ""
              echo "**Full Changelog / 完整变更记录**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
            echo ""
            echo "---"
            echo ""
            echo "### Installation / 安装说明"
            echo ""
            echo "Download the binary for your platform from the assets below. The \`musl\` (static) builds have **zero dependencies** and run on any Linux distribution."
            echo ""
            echo "请从下方资源中下载适合您平台的二进制文件。\`musl\`（静态）版本**无任何外部依赖**，可在任意 Linux 发行版上直接运行。"
            echo ""
            echo "| Platform / 平台 | File / 文件 | Note / 说明 |"
            echo "|---|---|---|"
            echo "| Linux x64 | \`fqc-${TAG}-x86_64-unknown-linux-gnu.tar.gz\` | Dynamic (glibc) / 动态链接 |"
            echo "| Linux x64 (static) | \`fqc-${TAG}-x86_64-unknown-linux-musl.tar.gz\` | **Static, runs anywhere / 静态链接，任意 Linux 可运行** |"
            echo "| Linux arm64 | \`fqc-${TAG}-aarch64-unknown-linux-gnu.tar.gz\` | Dynamic (glibc) / 动态链接 |"
            echo "| Linux arm64 (static) | \`fqc-${TAG}-aarch64-unknown-linux-musl.tar.gz\` | **Static, runs anywhere / 静态链接，任意 Linux 可运行** |"
            echo "| Windows x64 | \`fqc-${TAG}-x86_64-pc-windows-msvc.zip\` | |"
            echo "| macOS x64 | \`fqc-${TAG}-x86_64-apple-darwin.tar.gz\` | Intel Mac |"
            echo "| macOS arm64 | \`fqc-${TAG}-aarch64-apple-darwin.tar.gz\` | Apple Silicon |"
            echo ""
            echo "### Quick Start / 快速开始"
            echo ""
            echo "\`\`\`bash"
            echo "# Linux / macOS"
            echo "tar xzf fqc-${TAG}-<platform>.tar.gz"
            echo "chmod +x fqc"
            echo "./fqc --help"
            echo ""
            echo "# Compress / 压缩"
            echo "./fqc compress input.fastq -o output.fqc"
            echo ""
            echo "# Decompress / 解压"
            echo "./fqc decompress output.fqc -o restored.fastq"
            echo "\`\`\`"
            echo ""
            echo "### Verify Checksums / 校验文件完整性"
            echo ""
            echo "\`\`\`bash"
            echo "sha256sum -c checksums-sha256.txt"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "fqc ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: release-assets/*
          generate_release_notes: false
