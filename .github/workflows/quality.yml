# .github/workflows/quality.yml
# =============================================================================
# Code Quality Checks for fq-compressor-rust
# =============================================================================
# Runs on every PR and push to main/master branch.
# Format checking and static analysis (clippy) are separated from CI builds.
# Features: format check, clippy pedantic, documentation check.
# =============================================================================

name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ===========================================================================
  # Format Check Job
  # ===========================================================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check TOML formatting
        run: |
          if command -v taplo &> /dev/null; then
            taplo check
          else
            echo "taplo not installed, skipping TOML format check"
          fi

  # ===========================================================================
  # Static Analysis Job (Clippy)
  # ===========================================================================
  static-analysis:
    name: Static Analysis (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ===========================================================================
  # Documentation Check Job
  # ===========================================================================
  doc-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - name: Check documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -Dwarnings

  # ===========================================================================
  # Quality Gate Job
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [format-check, static-analysis, doc-check]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ needs.format-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Clippy | ${{ needs.static-analysis.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.doc-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.format-check.result }}" != "success" ]]; then
            echo ""
            echo "❌ Format check failed - run 'cargo fmt --all' to fix"
            exit 1
          fi
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo ""
            echo "❌ Static analysis (Clippy) failed"
            exit 1
          fi
          if [[ "${{ needs.doc-check.result }}" != "success" ]]; then
            echo ""
            echo "❌ Documentation check failed"
            exit 1
          fi
          echo ""
          echo "✅ All quality checks passed!"
