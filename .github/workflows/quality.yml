# .github/workflows/quality.yml
# =============================================================================
# Code Quality Checks for fq-compressor-rust
# =============================================================================
# Runs on every PR and push to main/master branch.
# Format checking and static analysis (clippy) are separated from CI builds.
# =============================================================================

name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================================================
  # Format Check Job
  # ===========================================================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ===========================================================================
  # Static Analysis Job (Clippy)
  # ===========================================================================
  static-analysis:
    name: Static Analysis (Clippy)
    runs-on: ubuntu-latest
    needs: format-check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  # ===========================================================================
  # Quality Gate Job
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [format-check, static-analysis]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.format-check.result }}" != "success" ]]; then
            echo "Format check failed"
            exit 1
          fi
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "Static analysis failed"
            exit 1
          fi
          echo "All quality checks passed!"
