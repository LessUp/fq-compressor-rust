name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Cargo.toml
      - Cargo.lock
      - package.json
      - package-lock.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - Cargo.toml
      - Cargo.lock
      - package.json
      - package-lock.json

env:
  NODE_VERSION: '20'

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt, clippy, rust-analyzer
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: cargo fetch
      - run: npm ci
